<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Реєстрація та Вхід</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: white;
            padding: 40px 35px;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 420px;
        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
            color: #333;
            font-size: 28px;
        }

        .tabs {
            display: flex;
            background: #f1f1f1;
            border-radius: 10px;
            padding: 4px;
            margin-bottom: 30px;
        }

        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        .tab.active {
            background: #667eea;
            color: white;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        label {
            display: block;
            margin-bottom: 7px;
            color: #555;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 14px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .password-container {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #777;
            font-size: 18px;
        }

        button {
            width: 100%;
            padding: 15px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background: #5a6fd8;
        }

        .message {
            margin-top: 20px;
            padding: 14px;
            border-radius: 10px;
            text-align: center;
            font-size: 15px;
        }

        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="title">Реєстрація</h1>

        <div class="tabs">
            <div class="tab active" id="tab-register">Реєстрація</div>
            <div class="tab" id="tab-login">Вхід</div>
        </div>

        <!-- Форма реєстрації -->
        <form id="register-form">
            <div class="form-group">
                <label>Логін</label>
                <input type="text" id="reg-username" placeholder="Придумайте логін" required>
            </div>
            <div class="form-group">
                <label>Пароль</label>
                <div class="password-container">
                    <input type="password" id="reg-password" placeholder="Придумайте пароль" required>
                    <span class="toggle-password" id="toggle-reg">👁</span>
                </div>
            </div>
            <div class="form-group">
                <label>Підтвердіть пароль</label>
                <div class="password-container">
                    <input type="password" id="reg-confirm" placeholder="Повторіть пароль" required>
                    <span class="toggle-password" id="toggle-confirm">👁</span>
                </div>
            </div>
            <button type="submit">Зареєструватися</button>
        </form>

        <!-- Форма входу -->
        <form id="login-form" style="display: none;">
            <div class="form-group">
                <label>Логін</label>
                <input type="text" id="login-username" placeholder="Введіть логін" required>
            </div>
            <div class="form-group">
                <label>Пароль</label>
                <div class="password-container">
                    <input type="password" id="login-password" placeholder="Введіть пароль" required>
                    <span class="toggle-password" id="toggle-login">👁</span>
                </div>
            </div>
            <button type="submit">Увійти</button>
        </form>

        <div id="message" class="message"></div>
    </div>

    <script>
        // Елементи
        const tabRegister = document.getElementById('tab-register');
        const tabLogin = document.getElementById('tab-login');
        const registerForm = document.getElementById('register-form');
        const loginForm = document.getElementById('login-form');
        const title = document.getElementById('title');
        const message = document.getElementById('message');

        // Перемикання вкладок
        tabRegister.addEventListener('click', () => {
            registerForm.style.display = 'block';
            loginForm.style.display = 'none';
            tabRegister.classList.add('active');
            tabLogin.classList.remove('active');
            title.textContent = 'Реєстрація';
            clearMessage();
        });

        tabLogin.addEventListener('click', () => {
            registerForm.style.display = 'none';
            loginForm.style.display = 'block';
            tabLogin.classList.add('active');
            tabRegister.classList.remove('active');
            title.textContent = 'Вхід';
            clearMessage();
        });

        function showMessage(text, type) {
            message.innerHTML = text;
            message.className = `message ${type}`;
        }

        function clearMessage() {
            message.textContent = '';
        }

        // Показати/сховати пароль
        function togglePassword(inputId, toggleId) {
            const input = document.getElementById(inputId);
            const toggle = document.getElementById(toggleId);
            
            toggle.addEventListener('click', () => {
                if (input.type === 'password') {
                    input.type = 'text';
                    toggle.textContent = '🙈';
                } else {
                    input.type = 'password';
                    toggle.textContent = '👁';
                }
            });
        }

        togglePassword('reg-password', 'toggle-reg');
        togglePassword('reg-confirm', 'toggle-confirm');
        togglePassword('login-password', 'toggle-login');

        // Реєстрація
        registerForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const username = document.getElementById('reg-username').value.trim();
            const password = document.getElementById('reg-password').value;
            const confirm = document.getElementById('reg-confirm').value;

            if (!username || !password) {
                showMessage('Заповніть усі поля!', 'error');
                return;
            }

            if (password !== confirm) {
                showMessage('Паролі не співпадають!', 'error');
                return;
            }

            if (localStorage.getItem(username)) {
                showMessage('Такий користувач вже існує!', 'error');
                return;
            }

            localStorage.setItem(username, password);
            showMessage('✅ Реєстрація успішна!', 'success');

            setTimeout(() => {
                document.getElementById('login-username').value = username;
                tabLogin.click(); // Перехід на вкладку входу
            }, 1200);
        });

        // Вхід
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const username = document.getElementById('login-username').value.trim();
            const password = document.getElementById('login-password').value;

            const savedPassword = localStorage.getItem(username);

            if (savedPassword && savedPassword === password) {
                showMessage(`✅ Вхід успішний!<br>Ласкаво просимо, <strong>${username}</strong>!`, 'success');
                
                setTimeout(() => {
                    alert(`🎉 Вітаємо, ${username}!\nВи успішно увійшли в систему!`);
                }, 1000);
            } else {
                showMessage('❌ Невірний логін або пароль!', 'error');
            }
        });
    </script>
</body>
</html>
