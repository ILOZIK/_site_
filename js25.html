<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Таблиця множення</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #eef2f7;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 1.5rem;
    }

    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
      padding: 2rem;
      width: 100%;
      max-width: 380px;
    }

    h1 {
      font-size: 18px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 0.25rem;
    }

    .sub {
      font-size: 13px;
      color: #999;
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      font-size: 13px;
      color: #555;
      margin-bottom: 6px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 1rem;
    }

    input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 10px;
      font-size: 15px;
      outline: none;
      color: #1a1a2e;
      text-align: center;
      transition: border-color 0.2s;
    }

    input:focus { border-color: #4f8ef7; }

    button.calc {
      width: 100%;
      padding: 12px;
      background: #4f8ef7;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    button.calc:hover { background: #3a7ae0; }

    .result { margin-top: 1.5rem; }

    .answer {
      background: #f7f8fb;
      border: 1px solid #e4e8f0;
      border-radius: 10px;
      padding: 1.25rem;
      text-align: center;
    }

    .expr {
      font-size: 15px;
      color: #888;
      margin-bottom: 6px;
    }

    .value {
      font-size: 36px;
      font-weight: 700;
      color: #1a1a2e;
    }

    button.reset {
      margin-top: 1rem;
      width: 100%;
      padding: 10px;
      background: none;
      border: 1px solid #ddd;
      border-radius: 10px;
      font-size: 14px;
      color: #777;
      cursor: pointer;
      transition: all 0.2s;
    }

    button.reset:hover { border-color: #4f8ef7; color: #4f8ef7; }

    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Таблиця множення</h1>
    <p class="sub">Введіть два числа</p>

    <div class="row">
      <div>
        <label>Перше число</label>
        <input type="number" id="a" placeholder="a" step="0.01" />
      </div>
      <div>
        <label>Друге число</label>
        <input type="number" id="b" placeholder="b" step="0.01" />
      </div>
    </div>

    <button class="calc" onclick="calc()">Помножити</button>

    <div class="result hidden" id="result">
      <div class="answer">
        <div class="expr" id="expr"></div>
        <div class="value" id="value"></div>
      </div>
      <button class="reset" onclick="reset()">Помножити інші числа</button>
    </div>
  </div>

  <script>
    function calc() {
      const a = parseFloat(document.getElementById("a").value);
      const b = parseFloat(document.getElementById("b").value);
      if (isNaN(a) || isNaN(b)) return;

      document.getElementById("expr").textContent = `${a} × ${b} =`;
      document.getElementById("value").textContent = parseFloat((a * b).toFixed(10));
      document.getElementById("result").classList.remove("hidden");
    }

    function reset() {
      document.getElementById("a").value = "";
      document.getElementById("b").value = "";
      document.getElementById("result").classList.add("hidden");
      document.getElementById("a").focus();
    }

    document.addEventListener("keydown", e => {
      if (e.key === "Enter") calc();
    });
  </script>
</body>
</html>
