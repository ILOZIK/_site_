<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Країна → Континент</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            padding: 2rem;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 2.5rem;
            width: 100%;
            max-width: 520px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .globe {
            font-size: 3rem;
            display: block;
            margin-bottom: 0.75rem;
        }

        h1 {
            font-size: 1.6rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 0.4rem;
        }

        .subtitle {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.5);
        }

        .search-wrap {
            display: flex;
            gap: 10px;
            margin-bottom: 1.25rem;
        }

        input {
            flex: 1;
            padding: 0.75rem 1rem;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        input:focus {
            border-color: rgba(100, 160, 255, 0.6);
        }

        button {
            padding: 0.75rem 1.25rem;
            border-radius: 12px;
            border: none;
            background: #4a7cf7;
            color: #fff;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            white-space: nowrap;
        }

        button:hover { background: #3a6ce7; }
        button:active { transform: scale(0.97); }

        .tags-label {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.35);
            margin-bottom: 0.5rem;
        }

        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 1.5rem;
        }

        .tag {
            font-size: 0.78rem;
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.6);
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
        }

        .tag:hover {
            background: rgba(255, 255, 255, 0.14);
            color: #fff;
        }

        .result {
            min-height: 90px;
        }

        .result-card {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 1.25rem;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            animation: fadeIn 0.25s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .icon-box {
            width: 58px;
            height: 58px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            flex-shrink: 0;
        }

        .result-label {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.45);
            margin-bottom: 3px;
        }

        .result-continent {
            font-size: 1.3rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 2px;
        }

        .result-country {
            font-size: 0.82rem;
            color: rgba(255, 255, 255, 0.45);
        }

        .error-card {
            text-align: center;
            padding: 1.5rem;
            border-radius: 16px;
            border: 1px solid rgba(255, 100, 100, 0.2);
            background: rgba(255, 80, 80, 0.06);
            color: rgba(255, 255, 255, 0.55);
            font-size: 0.9rem;
            animation: fadeIn 0.25s ease;
            line-height: 1.6;
        }

        .error-card span {
            color: #ff8080;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <i class="globe">🌍</i>
            <h1>Країна → Континент</h1>
            <p class="subtitle">Введіть назву країни українською мовою</p>
        </div>

        <div class="search-wrap">
            <input type="text" id="inp" placeholder="Наприклад: Японія, Бразилія…" />
            <button onclick="search()">Знайти</button>
        </div>

        <p class="tags-label">Спробуйте:</p>
        <div class="tags" id="tags"></div>

        <div class="result" id="result"></div>
    </div>

    <script>

            "Китай":"Азія","Японія":"Азія","Індія":"Азія","Південна Корея":"Азія","Північна Корея":"Азія","В'єтнам":"Азія","Таїланд":"Азія","Індонезія":"Азія","Малайзія":"Азія","Філіппіни":"Азія","Сінгапур":"Азія","М'янма":"Азія","Камбоджа":"Азія","Лаос":"Азія","Бруней":"Азія","Тімор-Лесте":"Азія","Бангладеш":"Азія","Пакистан":"Азія","Афганістан":"Азія","Непал":"Азія","Шрі-Ланка":"Азія","Мальдіви":"Азія","Бутан":"Азія","Іран":"Азія","Ірак":"Азія","Сирія":"Азія","Туреччина":"Азія","Саудівська Аравія":"Азія","ОАЕ":"Азія","Катар":"Азія","Кувейт":"Азія","Бахрейн":"Азія","Оман":"Азія","Ємен":"Азія","Йорданія":"Азія","Ліван":"Азія","Ізраїль":"Азія","Палестина":"Азія","Росія":"Азія","Казахстан":"Азія","Узбекистан":"Азія","Туркменістан":"Азія","Таджикистан":"Азія","Киргизстан":"Азія","Монголія":"Азія","Азербайджан":"Азія","Вірменія":"Азія","Грузія":"Азія",
            "Єгипет":"Африка","Нігерія":"Африка","ПАР":"Африка","Ефіопія":"Африка","Кенія":"Африка","Танзанія":"Африка","Уганда":"Африка","Гана":"Африка","Камерун":"Африка","Кот-д'Івуар":"Африка","Мозамбік":"Африка","Мадагаскар":"Африка","Ангола":"Африка","Замбія":"Африка","Зімбабве":"Африка","Малаві":"Африка","Руанда":"Африка","Бурунді":"Африка","Сомалі":"Африка","Судан":"Африка","Південний Судан":"Африка","Чад":"Африка","Нігер":"Африка","Малі":"Африка","Буркіна-Фасо":"Африка","Сенегал":"Африка","Гвінея":"Африка","Бенін":"Африка","Того":"Африка","Сьєрра-Леоне":"Африка","Ліберія":"Африка","Гамбія":"Африка","Гвінея-Бісау":"Африка","Кабо-Верде":"Африка","Маврикій":"Африка","Сейшели":"Африка","Коморські острови":"Африка","Лесото":"Африка","Есватіні":"Африка","Намібія":"Африка","Ботсвана":"Африка","Габон":"Африка","Республіка Конго":"Африка","ДР Конго":"Африка","Центральноафриканська Республіка":"Африка","Екваторіальна Гвінея":"Африка","Сан-Томе і Принсіпі":"Африка","Джибуті":"Африка","Еритрея":"Африка","Лівія":"Африка","Туніс":"Африка","Алжир":"Африка","Марокко":"Африка","Мавританія":"Африка",
            "США":"Північна Америка","Канада":"Північна Америка","Мексика":"Північна Америка","Гватемала":"Північна Америка","Беліз":"Північна Америка","Гондурас":"Північна Америка","Сальвадор":"Північна Америка","Нікарагуа":"Північна Америка","Коста-Рика":"Північна Америка","Панама":"Північна Америка","Куба":"Північна Америка","Ямайка":"Північна Америка","Гаїті":"Північна Америка","Домініканська Республіка":"Північна Америка","Пуерто-Рико":"Північна Америка","Тринідад і Тобаго":"Північна Америка","Барбадос":"Північна Америка","Багами":"Північна Америка","Антигуа і Барбуда":"Північна Америка","Сент-Кіттс і Невіс":"Північна Америка","Домініка":"Північна Америка","Сент-Люсія":"Північна Америка","Сент-Вінсент і Гренадини":"Північна Америка","Гренада":"Північна Америка",
            "Бразилія":"Південна Америка","Аргентина":"Південна Америка","Чилі":"Південна Америка","Колумбія":"Південна Америка","Венесуела":"Південна Америка","Перу":"Південна Америка","Еквадор":"Південна Америка","Болівія":"Південна Америка","Парагвай":"Південна Америка","Уругвай":"Південна Америка","Гайана":"Південна Америка","Суринам":"Південна Америка",
            "Австралія":"Австралія і Океанія","Нова Зеландія":"Австралія і Океанія","Папуа Нова Гвінея":"Австралія і Океанія","Фіджі":"Австралія і Океанія","Соломонові острови":"Австралія і Океанія","Вануату":"Австралія і Океанія","Самоа":"Австралія і Океанія","Тонга":"Австралія і Океанія","Кірибаті":"Австралія і Океанія","Мікронезія":"Австралія і Океанія","Палау":"Австралія і Океанія","Маршаллові острови":"Австралія і Океанія","Науру":"Австралія і Океанія","Тувалу":"Австралія і Океанія"
        };

        const info = {
            "Європа":              { emoji: "🏰", bg: "rgba(174,169,236,0.15)", accent: "#AFA9EC" },
            "Азія":                { emoji: "🏯", bg: "rgba(93,202,165,0.15)",  accent: "#5DCAA5" },
            "Африка":              { emoji: "🌅", bg: "rgba(239,159,39,0.15)",  accent: "#EF9F27" },
            "Північна Америка":    { emoji: "🗽", bg: "rgba(55,138,221,0.15)",  accent: "#378ADD" },
            "Південна Америка":    { emoji: "🌿", bg: "rgba(99,153,34,0.15)",   accent: "#639922" },
            "Австралія і Океанія": { emoji: "🦘", bg: "rgba(216,90,48,0.15)",   accent: "#D85A30" }
        };

        const examples = ["Японія","Бразилія","Єгипет","Канада","Австралія","Франція","ПАР","Індія","США","Китай"];

        function search() {
            const val = document.getElementById("inp").value.trim();
            const el = document.getElementById("result");
            if (!val) { el.innerHTML = ""; return; }
            const continent = data[val];
            if (continent) {
                const i = info[continent];
                el.innerHTML = `
                    <div class="result-card" style="background:${i.bg};border-color:${i.accent}30">
                        <div class="icon-box" style="background:${i.accent}22">${i.emoji}</div>
                        <div>
                            <p class="result-label">Континент</p>
                            <p class="result-continent" style="color:${i.accent}">${continent}</p>
                            <p class="result-country">${val}</p>
                        </div>
                    </div>`;
            } else {
                el.innerHTML = `
                    <div class="error-card">
                        🔍 Країну "<span>${val}</span>" не знайдено.<br>
                        Перевірте правопис і спробуйте ще раз.
                    </div>`;
            }
        }

        document.getElementById("inp").addEventListener("keydown", e => {
            if (e.key === "Enter") search();
        });

        const tagsEl = document.getElementById("tags");
        examples.forEach(c => {
            const t = document.createElement("span");
            t.className = "tag";
            t.textContent = c;
            t.onclick = () => { document.getElementById("inp").value = c; search(); };
            tagsEl.appendChild(t);
        });
    </script>
</body>
</html>
