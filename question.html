<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Питання про космос</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;

            /* новий більш приємний фон */
            background: linear-gradient(135deg, #1f1c2c, #928dab);
        }

        .container {
            text-align: center;
            width: 360px;

            /* більш сучасна картка */
            background: rgba(255, 255, 255, 0.12);
            padding: 35px;
            border-radius: 20px;

            backdrop-filter: blur(12px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);

            color: white;
        }

        h1 {
            margin-bottom: 10px;
        }

        p {
            opacity: 0.9;
        }

        input {
            width: 85%;
            padding: 12px;
            margin-top: 15px;

            border: none;
            border-radius: 10px;

            text-align: center;
            font-size: 16px;
            outline: none;
        }

        button {
            margin-top: 15px;
            padding: 12px 25px;

            border: none;
            border-radius: 10px;

            cursor: pointer;
            font-weight: bold;

            background: linear-gradient(90deg, #00c6ff, #0072ff);
            color: white;

            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
        }

        #result {
            margin-top: 18px;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Питання про космос📝</h1>
    <p>В якому році був перший політ людини у космос?</p>

    <input type="number" id="yearInput" placeholder="Введіть рік">

    <button onclick="checkYear()">Перевірити</button>

    <div id="result"></div>
</div>

<script>
    function checkYear() {
        let spaceYear = document.getElementById("yearInput").value;
        let result = document.getElementById("result");

        if (spaceYear === "") {
            result.textContent = "Введіть рік!";
            return;
        }

        spaceYear = Number(spaceYear);

        if (spaceYear < 1961) {
            result.textContent = "🧊 Та ні, це щось дуже рано!";
        } 
        else if (spaceYear > 1961) {
            result.textContent = "🚀 О ні, в цей час вже багато хто політав!";
        } 
        else if (spaceYear === 1961) {
            result.textContent = "🎉 Так, Ваша відповідь правильна!";
        } 
        else {
            result.textContent = "Це не рік!";
        }
    }
</script>

</body>
</html>
