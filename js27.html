<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Піднесення до степеня</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #f5f4f0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #1a1a1a;
    }
    .card {
      background: #ffffff;
      border: 1px solid #e0ddd6;
      border-radius: 16px;
      padding: 40px 36px;
      max-width: 440px;
      width: 100%;
    }
    .header {
      text-align: center;
      margin-bottom: 28px;
    }
    .header i { font-size: 22px; color: #7f77dd; }
    h1 { font-size: 20px; font-weight: 600; color: #1a1a1a; margin-top: 8px; }
    .subtitle { font-size: 13px; color: #888780; margin-top: 4px; }
    label { display: block; font-size: 13px; color: #5f5e5a; margin-bottom: 8px; }
    input[type=number] {
      width: 100%;
      font-size: 22px;
      text-align: center;
      padding: 12px 16px;
      border: 1px solid #d3d1c7;
      border-radius: 10px;
      outline: none;
      background: #faf9f6;
      color: #1a1a1a;
      transition: border-color 0.2s, box-shadow 0.2s;
      -moz-appearance: textfield;
    }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input[type=number]:focus {
      border-color: #7f77dd;
      box-shadow: 0 0 0 3px rgba(127, 119, 221, 0.15);
    }
    .field { margin-bottom: 16px; }
    button[type=submit] {
      width: 100%;
      padding: 13px;
      margin-top: 8px;
      background: #7f77dd;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    button[type=submit]:hover { background: #534ab7; }
    button[type=submit]:active { transform: scale(0.98); }
    .result-box {
      background: #f5f4f0;
      border: 1px solid #e0ddd6;
      border-radius: 12px;
      padding: 24px 16px;
      margin-top: 24px;
      text-align: center;
    }
    .result-label { font-size: 13px; color: #888780; margin-bottom: 8px; }
    .result-expr { font-size: 20px; color: #5f5e5a; margin-bottom: 10px; }
    .result-value { font-size: 42px; font-weight: 600; color: #7f77dd; }
    .reset-btn {
      display: block;
      width: 100%;
      margin-top: 12px;
      padding: 10px;
      background: none;
      border: 1px solid #d3d1c7;
      border-radius: 10px;
      font-size: 14px;
      color: #5f5e5a;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .reset-btn:hover { background: #f5f4f0; color: #1a1a1a; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <i class="fa-solid fa-superscript"></i>
      <h1>Піднесення до степеня</h1>
    </div>

    <form id="powerForm">
      <div class="field">
        <label for="a">Основа (a)</label>
        <input type="number" id="a" step="0.01" placeholder="Наприклад: 5" required>
      </div>
      <div class="field">
        <label for="b">Степінь (b)</label>
        <input type="number" id="b" step="0.01" placeholder="Наприклад: 3" required>
      </div>
      <button type="submit">Розрахувати a<sup>b</sup></button>
    </form>

    <div id="result" class="hidden">
      <div class="result-box">
        <p class="result-label">Результат</p>
        <p class="result-expr" id="calculation"></p>
        <p class="result-value" id="resultValue"></p>
      </div>
      <button class="reset-btn" onclick="resetForm()">
        <i class="fa-solid fa-rotate-left"></i> Новий розрахунок
      </button>
    </div>
  </div>

  <script>
    document.getElementById('powerForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const a = Number(document.getElementById('a').value);
      const b = Number(document.getElementById('b').value);
      const res = Math.pow(a, b);
      document.getElementById('calculation').innerHTML = `${a}<sup>${b}</sup> =`;
      document.getElementById('resultValue').textContent = parseFloat(res.toFixed(10)).toString();
      document.getElementById('result').classList.remove('hidden');
    });

    function resetForm() {
      document.getElementById('powerForm').reset();
      document.getElementById('result').classList.add('hidden');
      document.getElementById('a').focus();
    }
  </script>
</body>
</html>
