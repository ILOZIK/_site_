<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let grade = +prompt("Яка в тебе сьогодні оцінка?", "");
            switch(grade){
                case 1:
                case 2:
                case 3:
                case 4:
                    alert("Дуже погано!");
                        break;
                case 5:
                case 6:
                case 7:
                    alert("Погано!");
                        break;
                case 8:
                case 9:
                    alert("Слабенько");
                        break;
                case 10:
                case 11:
                case 12:
                    alert("Супер!");
                        break;
                default:
                    alert("Такої оцінки не існує!");
            }
    </script>
</body>
</html>
