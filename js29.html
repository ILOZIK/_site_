<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Чи більше/менше 100?</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #f5f4f0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #1a1a1a;
    }
    .card {
      background: #ffffff;
      border: 1px solid #e0ddd6;
      border-radius: 16px;
      padding: 40px 36px;
      max-width: 440px;
      width: 100%;
    }
    .header { text-align: center; margin-bottom: 28px; }
    .header i { font-size: 22px; color: #7f77dd; }
    h1 { font-size: 20px; font-weight: 600; color: #1a1a1a; margin-top: 8px; }
    .subtitle { font-size: 13px; color: #888780; margin-top: 4px; }
    label { display: block; font-size: 13px; color: #5f5e5a; margin-bottom: 8px; }
    input[type=number] {
      width: 100%;
      font-size: 26px;
      text-align: center;
      padding: 14px 16px;
      border: 1px solid #d3d1c7;
      border-radius: 10px;
      outline: none;
      background: #faf9f6;
      color: #1a1a1a;
      transition: border-color 0.2s, box-shadow 0.2s;
      -moz-appearance: textfield;
    }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input[type=number]:focus {
      border-color: #7f77dd;
      box-shadow: 0 0 0 3px rgba(127, 119, 221, 0.15);
    }
    button[type=submit] {
      width: 100%;
      padding: 13px;
      margin-top: 16px;
      background: #7f77dd;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    button[type=submit]:hover { background: #534ab7; }
    button[type=submit]:active { transform: scale(0.98); }
    .result-box {
      margin-top: 20px;
      border-radius: 10px;
      padding: 22px 16px;
      text-align: center;
      display: none;
    }
    .result-box.less {
      background: #e6f1fb;
      border: 1px solid #85b7eb;
    }
    .result-box.greater {
      background: #fbeaf0;
      border: 1px solid #ed93b1;
    }
    .result-box.equal {
      background: #eaf3de;
      border: 1px solid #97c459;
    }
    .result-icon { font-size: 36px; margin-bottom: 8px; }
    .result-text { font-size: 20px; font-weight: 600; }
    .result-box.less .result-icon,
    .result-box.less .result-text { color: #185fa5; }
    .result-box.greater .result-icon,
    .result-box.greater .result-text { color: #993556; }
    .result-box.equal .result-icon,
    .result-box.equal .result-text { color: #3b6d11; }
    .reset-btn {
      display: block;
      width: 100%;
      margin-top: 12px;
      padding: 10px;
      background: none;
      border: 1px solid #d3d1c7;
      border-radius: 10px;
      font-size: 14px;
      color: #5f5e5a;
      cursor: pointer;
      transition: background 0.2s;
      display: none;
    }
    .reset-btn:hover { background: #f5f4f0; color: #1a1a1a; }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <i class="fa-solid fa-scale-balanced"></i>
      <h1>Чи більше / менше 100?</h1>
    </div>

    <form id="compareForm">
      <label for="number">Введіть ваше число</label>
      <input type="number" id="number" placeholder="Наприклад: 75" autofocus required>
      <button type="submit">Перевірити</button>
    </form>

    <div id="resultBox" class="result-box">
      <div class="result-icon" id="resultIcon"></div>
      <div class="result-text" id="resultText"></div>
    </div>

    <button class="reset-btn" id="resetBtn" onclick="resetForm()">
      <i class="fa-solid fa-rotate-left"></i> Ввести інше число
    </button>
  </div>

  <script>
    document.getElementById('compareForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const num = Number(document.getElementById('number').value);
      const box = document.getElementById('resultBox');
      const icon = document.getElementById('resultIcon');
      const text = document.getElementById('resultText');
      const resetBtn = document.getElementById('resetBtn');

      box.className = 'result-box';

      if (num < 100) {
        box.classList.add('less');
        icon.innerHTML = '<i class="fa-solid fa-arrow-down"></i>';
        text.textContent = `${num} — менше 100`;
      } else if (num > 100) {
        box.classList.add('greater');
        icon.innerHTML = '<i class="fa-solid fa-arrow-up"></i>';
        text.textContent = `${num} — більше 100`;
      } else {
        box.classList.add('equal');
        icon.innerHTML = '<i class="fa-solid fa-equals"></i>';
        text.textContent = 'Число дорівнює 100';
      }

      box.style.display = 'block';
      resetBtn.style.display = 'block';
    });

    function resetForm() {
      document.getElementById('compareForm').reset();
      document.getElementById('resultBox').style.display = 'none';
      document.getElementById('resetBtn').style.display = 'none';
      document.getElementById('number').focus();
    }
  </script>
</body>
</html>
