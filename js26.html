<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Емодзі за кодом</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #f5f4f0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #1a1a1a;
    }
    .card {
      background: #ffffff;
      border: 1px solid #e0ddd6;
      border-radius: 16px;
      padding: 40px 36px;
      max-width: 440px;
      width: 100%;
      text-align: center;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 6px;
    }
    .header i { font-size: 22px; color: #7f77dd; }
    h1 { font-size: 20px; font-weight: 600; color: #1a1a1a; }
    .subtitle { font-size: 13px; color: #888780; margin-bottom: 28px; }
    label { display: block; font-size: 13px; color: #5f5e5a; margin-bottom: 8px; text-align: left; }
    input {
      width: 100%;
      font-size: 22px;
      text-align: center;
      letter-spacing: 0.15em;
      padding: 12px 16px;
      border: 1px solid #d3d1c7;
      border-radius: 10px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      background: #faf9f6;
      color: #1a1a1a;
    }
    input:focus {
      border-color: #7f77dd;
      box-shadow: 0 0 0 3px rgba(127, 119, 221, 0.15);
    }
    .result {
      background: #f5f4f0;
      border: 1px solid #e0ddd6;
      border-radius: 12px;
      padding: 28px 16px;
      margin-top: 20px;
      min-height: 148px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: border-color 0.2s;
    }
    #emoji { font-size: 72px; line-height: 1; min-height: 76px; display: flex; align-items: center; }
    #code-label { font-size: 13px; color: #888780; font-family: 'Courier New', monospace; }
    .hint { font-size: 12px; color: #b4b2a9; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <i class="fa-solid fa-face-smile"></i>
      <h1>Емодзі за кодом</h1>
    </div>

    <label for="code-input">Unicode код емодзі</label>
    <input id="code-input" type="text" maxlength="7" placeholder="Наприклад: 128512" autofocus>

    <div class="result" id="result-card">
      <div id="emoji"></div>
      <div id="code-label"></div>
    </div>

    <p class="hint">Введіть код від 5 символів — наприклад: 128512, 129409, 10084</p>
  </div>

  <script>
    const input = document.getElementById('code-input');
    const emojiDiv = document.getElementById('emoji');
    const codeLabel = document.getElementById('code-label');
    const card = document.getElementById('result-card');

    input.addEventListener('input', function () {
      const code = this.value.trim();
      if (code.length >= 5) {
        try {
          const point = parseInt(code);
          emojiDiv.textContent = String.fromCodePoint(point);
          codeLabel.textContent = 'U+' + point.toString(16).toUpperCase().padStart(4, '0');
          card.style.borderColor = '#7f77dd';
        } catch (e) {
          emojiDiv.textContent = '❌';
          codeLabel.textContent = 'Невірний код';
          card.style.borderColor = '#e0ddd6';
        }
      } else {
        emojiDiv.textContent = '';
        codeLabel.textContent = '';
        card.style.borderColor = '#e0ddd6';
      }
    });
  </script>
</body>
</html>
